Root:
  Children:
    - ClassName: Workspace
      Name: Workspace
      Children:
        - ClassName: Cube
          Name: Baseplate
          Properties:
            Position: [0, -10, 0]
            Size: [64, 1, 64]
            Rotation: [0, 0, 0, 1]
            Color: [0.3, 0.3, 0.3, 1]
            Anchored: true
            CanCollide: true
            CastShadow: true
            Unlit: false

        # ヒンジの固定側（壁に固定）
        - ClassName: Cube
          Name: Base
          Properties:
            Position: [0, 2, -10]
            Size: [2, 2, 2]
            Rotation: [0, 0, 0, 1]
            Color: [0.5, 0.5, 0.5, 1]
            Anchored: true
            CanCollide: true
            CastShadow: true
            Unlit: false

        # 回転するアーム（Base の +X 面に接着、Y 軸周りに回転）
        - ClassName: Cube
          Name: Arm
          Properties:
            Position: [3, 2, -10]
            Size: [2, 0.5, 0.5]
            Rotation: [0, 0, 0, 1]
            Color: [1, 0.8, 0, 1]
            Anchored: false
            CanCollide: true
            CastShadow: true
            Unlit: false

        # Motor: Base の +X 面を接着面、Y 軸周りにモーター回転
        # Arm が Base の周りを Y 軸で回り続ける
        - ClassName: Motor
          Name: MotorTest
          Properties:
            Cube0: Base
            Cube1: Arm
            Axis: [0, 1, 0]
            DriveVelocity: 2.0
            MaxForce: 5000.0

    - ClassName: Lighting
      Name: Lighting
      Properties:
        Direction: [1, -1, -1]
        Brightness: 1
