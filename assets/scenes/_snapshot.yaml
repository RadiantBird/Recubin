Root:
  Children:
    - ClassName: Lighting
      Name: Lighting
      Properties:
        Direction: [1, -1, -1]
        Brightness: 1
    - ClassName: Workspace
      Name: Workspace
      Children:
        - ClassName: Cube
          Name: Baseplate
          Properties:
            Position: [0, -10, 0]
            Size: [64, 1, 64]
            Rotation: [0, 0, 0, 1]
            Color: [0.3, 0.3, 0.3, 1]
            Anchored: true
            CanCollide: true
            CastShadow: true
            Unlit: false
        - ClassName: Cube
          Name: PartA
          Properties:
            Position: [0, 5, -10]
            Size: [1, 1, 1]
            Rotation: [0, 0, 0, 1]
            Color: [1, 0.2, 0.2, 1]
            Anchored: false
            CanCollide: true
            CastShadow: true
            Unlit: false
        - ClassName: Cube
          Name: PartB
          Properties:
            Position: [1, 5, -10]
            Size: [1, 1, 1]
            Rotation: [0, 0, 0, 1]
            Color: [0.2, 0.2, 1, 1]
            Anchored: false
            CanCollide: true
            CastShadow: true
            Unlit: false
        - ClassName: Weld
          Name: WeldAB
          Properties:
            Cube0: PartA
            Cube1: PartB