Root:
  Children:
    - ClassName: Workspace
      Name: Workspace
      Properties:
        Gravity: [0, -9.81, 0]
      Children:
        # 床
        - ClassName: Cube
          Name: Baseplate
          Properties:
            Position: [0, -5, 0]
            Size: [40, 1, 40]
            Rotation: [0, 0, 0, 1]
            Color: [0.3, 0.7, 0.3, 1]
            Anchored: true
            CanCollide: true
            CastShadow: true
            Unlit: false

        # Touched テスト用の落下キューブ（y=2 から落下 → Baseplate に衝突）
        - ClassName: Cube
          Name: Dropper
          Properties:
            Position: [0, 2, 0]
            Size: [1, 1, 1]
            Rotation: [0, 0, 0, 1]
            Color: [1, 0.3, 0.3, 1]
            Anchored: false
            CanCollide: true
            CastShadow: true
            Unlit: false

        # テストスクリプト
        - ClassName: Script
          Name: SignalTest
          Properties:
            ContentPath: scripts/signal_test.luau
